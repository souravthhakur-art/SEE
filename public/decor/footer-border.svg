<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Decorative manuscript vine border">
  <!-- Repeating Pahari-style vine tile: central rosette with curling leaves -->
  <path d="M0,12 L34,12" opacity="0.5"/>
  <path d="M86,12 L120,12" opacity="0.5"/>
  <!-- central rosette -->
  <g transform="translate(60,12)">
    <circle r="3" opacity="0.7"/>
    <path d="M0,-7 C2,-5 2,-3 0,-2 C-2,-3 -2,-5 0,-7 Z" opacity="0.7"/>
    <path d="M0,7 C2,5 2,3 0,2 C-2,3 -2,5 0,7 Z" opacity="0.7"/>
    <path d="M-7,0 C-5,-2 -3,-2 -2,0 C-3,2 -5,2 -7,0 Z" opacity="0.7"/>
    <path d="M7,0 C5,-2 3,-2 2,0 C3,2 5,2 7,0 Z" opacity="0.7"/>
  </g>
  <!-- curling leaves either side -->
  <g transform="translate(40,12)">
    <path d="M0,0 C6,-6 10,-6 14,0 C10,2 6,2 0,0 Z" opacity="0.6"/>
    <path d="M2,0 C5,-3 8,-3 11,0" opacity="0.5"/>
  </g>
  <g transform="translate(80,12) scale(-1,1)">
    <path d="M0,0 C6,-6 10,-6 14,0 C10,2 6,2 0,0 Z" opacity="0.6"/>
    <path d="M2,0 C5,-3 8,-3 11,0" opacity="0.5"/>
  </g>
  <!-- tiny berries -->
  <circle cx="30" cy="9" r="1.1" opacity="0.5"/>
  <circle cx="30" cy="15" r="1.1" opacity="0.5"/>
  <circle cx="90" cy="9" r="1.1" opacity="0.5"/>
  <circle cx="90" cy="15" r="1.1" opacity="0.5"/>
</svg>
