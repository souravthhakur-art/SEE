<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 700" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" preserveAspectRatio="xMidYMax slice" role="img" aria-label="Guler-inspired line illustration of Himalayan hills, tea gardens, a village and a river">
